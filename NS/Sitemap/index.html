<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archival Data Visualizer</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Load Three.js from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <!-- Sidebar for view switching -->
    <div class="sidebar">
        <h2>Views</h2>
        <ul class="view-menu">
            <li class="view-option active" data-view="hierarchical">
                <span class="icon">📁</span> Hierarchical
            </li>
            <li class="view-option" data-view="timeline">
                <span class="icon">📅</span> Timeline
            </li>
            <li class="view-option" data-view="grid">
                <span class="icon">🖼️</span> Grid
            </li>
            <li class="view-option" data-view="graph">
                <span class="icon">🌐</span> Graph
            </li>
        </ul>
    </div>

    <!-- Main content area for views -->
    <div class="main-content">
        <div id="hierarchical-view" class="view active">
            <div class="folder-tree" id="folder-tree"></div>
        </div>
        <div id="timeline-view" class="view">
            <div class="timeline-container">
                <div class="timeline" id="timeline"></div>
                <div class="timeline-items" id="timeline-items"></div>
            </div>
        </div>
        <div id="grid-view" class="view">
            <div class="grid-container" id="grid-container"></div>
        </div>
        <div id="graph-view" class="view">
            <div id="graph-container"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
